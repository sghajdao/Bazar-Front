<h1 class="fw-bold text-primary" style="text-align: center;">Bazar</h1>
<br>
<div class="container shadow-lg p-3 mb-5 bg-body rounded" style="height: auto;width: 40%;">
	<h3 class="text-body-tertiary" style="text-align: center;">Register</h3>
	<br>
	<form [formGroup]="userData">
		<div class="form-floating mb-3 field">
			<input type="text" [class]="(validators.firstname && this.userData.get('firstname')!.invalid)? 'form-control border-danger-subtle' : 'form-control'" formControlName="firstname" placeholder="Firstname">
			<label for="floatingInput">Firstname</label>
			<span *ngIf="validators.firstname && this.userData.get('firstname')!.invalid" class="text-danger">firstname is required</span>
		</div>
		<div class="form-floating mb-3">
			<input type="text" [class]="(validators.firstname && this.userData.get('lastname')!.invalid)? 'form-control border-danger-subtle' : 'form-control'" formControlName="lastname" placeholder="Lastname">
			<label for="floatingPassword">Lastname</label>
			<span *ngIf="validators.lastname && this.userData.get('lastname')!.invalid" class="text-danger">lastname is required</span>
		</div>
	    <div class="form-floating mb-3">
			<input type="email" [class]="(validators.firstname && this.userData.get('email')!.invalid)? 'form-control border-danger-subtle' : 'form-control'" formControlName="email" placeholder="name@example.com">
			<label for="floatingInput">Email address</label>
			<span *ngIf="validators.email && this.userData.get('email')!.invalid" class="text-danger">email is required</span>
		</div>
	    <div class="form-floating mb-3">
			<input type="password" [class]="(validators.firstname && this.userData.get('password')!.invalid)? 'form-control border-danger-subtle' : 'form-control'" formControlName="password" placeholder="Password">
			<label for="floatingPassword">Password</label>
			<span *ngIf="validators.password && this.userData.get('password')!.invalid" class="text-danger">password is required</span>
		</div>
	</form>
	<br>
	<button mat-raised-button color="primary" style="width: 100%;" (click)="onSignUp()">Sign up</button>
	<hr>
	<p class="text-secondary" style="text-align: center;">Already have an account?</p>
	<button mat-raised-button style="width: 100%;" (click)="onSignIn()">Sign in</button>

    <div class="text-center mb-3">
		<br>
		<hr>
        <p class="text-secondary">or:</p>

		<div style="width: 250px;" class="container">
			<div id="g_id_onload"
			data-client_id="956881088059-j4a0vd8vji5t7h5od9smm1tft4hp966b.apps.googleusercontent.com"
			data-context="signin"
			data-ux_mode="popup"
			data-auto_select="true"
			data-itp_support="true"
			data-callback="handleCredentialResponse">
			</div>

			<div class="g_id_signin"
			data-type="standard"
			data-shape="pill"
			data-theme="filled_blue"
			data-text="signin_with"
			data-size="large"
			data-logo_alignment="left"
			data-width="200">
			</div>
		</div>
	</div>
</div>
