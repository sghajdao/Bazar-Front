<app-user-navbar></app-user-navbar>

<div class="product container">
    <mat-card class="example-card">
        <mat-card-header>
          <div *ngIf="store?.image" [style]="'background-image: url(http://localhost:8080/api/image/' + store?.image + ');'" mat-card-avatar class="example-header-image"></div>
          <mat-card-title>{{store?.name}}</mat-card-title>
          <mat-card-subtitle>{{store?.subtitle}}</mat-card-subtitle>
        </mat-card-header>
        <img mat-card-image *ngIf="product?.images![0]" [src]="'http://localhost:8080/api/image/' + product?.images![0]" alt="photo">
        <mat-card-content>
          <p>{{product?.title}}</p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button>LIKE</button>
          <button mat-button>SHARE</button>
        </mat-card-actions>
    </mat-card>
</div>
