<div style="padding-left: 20px;">
    <mat-card class="example-card">
        <mat-card-header>
          <mat-card-subtitle>PRICES & STOCK</mat-card-subtitle>
        </mat-card-header>
        <hr>
        <mat-card-content>
            <mat-form-field floatLabel="always" width="100%">
                <mat-label>Amount</mat-label>
                <input matInput type="number" class="example-right-align" placeholder="0" min="0">
                <span matTextPrefix>$&nbsp;</span>
                <span matTextSuffix>.00</span>
            </mat-form-field>
            <mat-form-field style="padding-left: 20px;">
                <mat-label>Amount</mat-label>
                <input matInput type="number" class="example-right-align" placeholder="0" min="0">
            </mat-form-field>
        </mat-card-content>
    </mat-card>

    <br>
    <br>

    <mat-card class="example-card">
        <mat-card-header>
          <mat-card-subtitle>CATEGORIZATION</mat-card-subtitle>
        </mat-card-header>
        <hr>
        <mat-card-content>
            <mat-form-field>
                <mat-label>Choose a category</mat-label>
                <mat-select>
                    <mat-option value="option1">Option 1</mat-option>
                    <mat-option value="option3">Option 3</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field style="padding-left: 10px;">
                <mat-label>Choose a brand</mat-label>
                <mat-select>
                    <mat-option value="option1">Option 1</mat-option>
                    <mat-option value="option3">Option 3</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Choose a collection</mat-label>
                <mat-select>
                    <mat-option value="option1">Option 1</mat-option>
                    <mat-option value="option3">Option 3</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field style="padding-left: 10px;">
                <mat-label>Choose a brand</mat-label>
                <mat-select>
                    <mat-option value="option1">Option 1</mat-option>
                    <mat-option value="option3">Option 3</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field class="example-form-field">
                <mat-label>Keywords</mat-label>
                <mat-chip-grid #chipGrid aria-label="Enter keywords" [formControl]="formControl" >
                    <mat-chip-row *ngFor="let keyword of keywords" (removed)="removeKeyword(keyword)">
                        {{keyword}}
                        <button matChipRemove aria-label="'remove ' + keyword">
                            <mat-icon>cancel</mat-icon>
                        </button>
                    </mat-chip-row>
                </mat-chip-grid>
                <input placeholder="New keyword..."
                        [matChipInputFor]="chipGrid"
                        (matChipInputTokenEnd)="add($event)"/>
            </mat-form-field>  
        </mat-card-content>
    </mat-card>

    <br>
    <br>

    <mat-card class="example-card">
        <mat-card-header>
          <mat-card-subtitle>PUBLISH</mat-card-subtitle>
        </mat-card-header>
        <hr>
        <mat-card-content>
            <label id="example-radio-group-label">Visibility: {{favoriteSeason}}</label>
            <button mat-button color="primary" class="ms-2" (click)="onEditVisibility()">Edit</button>
            <mat-radio-group
              *ngIf="editVisibility"
              aria-labelledby="example-radio-group-label"
              class="example-radio-group"
              [(ngModel)]="favoriteSeason">
                <mat-radio-button class="example-radio-button" *ngFor="let season of seasons" [value]="season">
                    {{season}}
                </mat-radio-button>
            </mat-radio-group>

            <br>
            <label id="example-radio-group-label">Publish {{selectedDate? selectedDate.toLocaleString() : 'immediately'}}</label>
            <button mat-button color="primary" class="ms-2" (click)="onEditPublishTime()">Edit</button>
            <br>
            <mat-form-field class="example-full-width" *ngIf="editPublishTime">
                <mat-label>Choose a date</mat-label>
                <input matInput [min]="minDate" [max]="maxDate" [matDatepicker]="picker" [(ngModel)]="selectedDate">
                <mat-hint>MM/DD/YYYY</mat-hint>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>
            <br>
            <button mat-raised-button color="primary">Publish</button>
        </mat-card-content>
    </mat-card>
</div>
