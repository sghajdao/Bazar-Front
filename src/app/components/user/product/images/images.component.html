<mat-card class="example-card">
    <mat-card-header>
      <div *ngIf="store?.image" [style]="'background-image: url(http://localhost:8080/api/image/' + store?.image + ');'" mat-card-avatar class="example-header-image"></div>
      <mat-card-title>{{store?.name}}</mat-card-title>
      <mat-card-subtitle>{{store?.subtitle}}</mat-card-subtitle>
    </mat-card-header>
    <img (click)="openImage()" class="image" mat-card-image *ngIf="product?.images![0]" [src]="'http://localhost:8080/api/image/' + image" alt="photo">
    <button (click)="leftImage()" mat-icon-button aria-label="Example icon-button with a menu" class="left-angle">
      <mat-icon>
        <svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 320 512">
          <path d="M41.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 256 246.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/>
        </svg>
      </mat-icon>
    </button>
    <button (click)="rightImage()" mat-icon-button aria-label="Example icon-button with a menu" class="right-angle">
      <mat-icon>
        <svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 320 512">
          <path d="M278.6 233.4c12.5 12.5 12.5 32.8 0 45.3l-160 160c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3L210.7 256 73.4 118.6c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l160 160z"/>
        </svg>
      </mat-icon>
    </button>
</mat-card>
