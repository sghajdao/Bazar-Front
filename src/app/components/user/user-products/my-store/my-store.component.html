<div style="padding-left: 30px;padding-right: 30px;padding-bottom: 20px;display: flex;">
    <div style="margin-left: 20px;" *ngFor="let item of products">
        <mat-card class="example-card" style="height: 430px;width: 250px;">
            <img style="cursor: pointer;" (click)="openProduct(item)" mat-card-image height="200" *ngIf="item" [src]="'http://localhost:8080/api/image/' + item.images![0]" alt="image">
            
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu" style="position: absolute;">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button (click)="editProduct(item)" mat-menu-item>
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>
              <button (click)="deleteProduct(item)" mat-menu-item>
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
            
            <mat-card-content style="cursor: pointer;" (click)="openProduct(item)">
              <p class="title">
                {{item.title}}
              </p>
              <h3>${{item.price}}</h3>
            </mat-card-content>
            <mat-card-header>
              <div (click)="storeSettings()" mat-card-avatar [style]="'background-image: url(http://localhost:8080/api/image/' + store?.image + ');'" class="example-header-image"></div>
              <mat-card-title>{{store?.name}}</mat-card-title>
              <mat-card-subtitle>{{store?.subtitle}}</mat-card-subtitle>
            </mat-card-header>
        </mat-card>
    </div>
</div>
