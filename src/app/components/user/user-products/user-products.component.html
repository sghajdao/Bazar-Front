<app-user-navbar *ngIf="isUser"></app-user-navbar>
<app-visitor-navbar *ngIf="isVisitor"></app-visitor-navbar>

<div *ngIf="!edit" style="display: flex;">
    <app-store-data [store]="store" [me]="me" [seller]="seller"></app-store-data>

    <app-store [store]="store" [seller]="seller" (productToEdit)="editProduct($event)"></app-store>
</div>

<app-edit-product *ngIf="edit" [productToEdit]="productToEdit" (edited)="productEdited($event)"></app-edit-product>
