<app-user-navbar></app-user-navbar>

<div style="padding-left: 30px;padding-right: 30px;padding-bottom: 20px;display: flex;">
    <div style="margin-left: 20px;" *ngFor="let item of products">
        <mat-card class="example-card" style="height: 430px;width: 250px;">
            <img mat-card-image height="200" *ngIf="item" [src]="'http://localhost:8080/api/image/' + item.images![0]" alt="Photo of a Shiba Inu">
            <mat-card-content>
              <p class="description">
                {{item.description}}
              </p>
              <h3>${{item.price}}</h3>
            </mat-card-content>
            <mat-card-header>
              <div mat-card-avatar class="example-header-image"></div>
              <mat-card-title>{{item.store?.seller?.firstname}} {{item.store?.seller?.lastname}}</mat-card-title>
              <mat-card-subtitle>Seller</mat-card-subtitle>
            </mat-card-header>
        </mat-card>
    </div>
</div>
